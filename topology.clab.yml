        - "leaf02:Ethernet1/2"
    - endpoints:
        - "spine02:Ethernet1/3"
        - "leaf03:Ethernet1/2"
    - endpoints:
        - "spine02:Ethernet1/4"
        - "leaf04:Ethernet1/2"
